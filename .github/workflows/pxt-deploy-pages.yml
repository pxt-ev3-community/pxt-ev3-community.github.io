name: pxt-deploy-static

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g pxt
          npm install

      - name: Fix old deps
        run: |
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      - name: Patch pxtarget.json for GitHub Pages
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('pxtarget.json', 'utf8'));
          data.appTheme = data.appTheme || {};

          const base = 'https://theb0nny.github.io/pxt-ev3/';

          data.appTheme.logoUrl = base;
          data.appTheme.homeUrl = base;

          if ('embedUrl' in data.appTheme) data.appTheme.embedUrl = base;
          if ('shareUrl' in data.appTheme) data.appTheme.shareUrl = base;

          if (Array.isArray(data.appTheme.docMenu)) {
            data.appTheme.docMenu = data.appTheme.docMenu.map(item => {
              if (!item || typeof item !== 'object') return item;
              const out = { ...item };
              for (const key of ['path', 'url']) {
                if (typeof out[key] === 'string' && out[key].startsWith('/')) {
                  out[key] = '/pxt-ev3' + out[key];
                }
              }
              return out;
            });
          }

          fs.writeFileSync('pxtarget.json', JSON.stringify(data, null, 4) + '\n');
          NODE

      - name: Patch docs sources before build
        run: |
          if [ -d "docs" ]; then
            find docs -type f \( -name "*.md" -o -name "*.json" \) \
              -exec sed -i \
                -e 's|"imageUrl": "/static/|"imageUrl": "/pxt-ev3/docs/static/|g' \
                -e "s|'imageUrl': '/static/|'imageUrl': '/pxt-ev3/docs/static/|g" \
                -e 's|"largeImageUrl": "/static/|"largeImageUrl": "/pxt-ev3/docs/static/|g' \
                -e "s|'largeImageUrl': '/static/|'largeImageUrl': '/pxt-ev3/docs/static/|g" \
                -e 's|"imageUrl": "/docs/static/|"imageUrl": "/pxt-ev3/docs/static/|g' \
                -e "s|'imageUrl': '/docs/static/|'imageUrl': '/pxt-ev3/docs/static/|g" \
                -e 's|"largeImageUrl": "/docs/static/|"largeImageUrl": "/pxt-ev3/docs/static/|g' \
                -e "s|'largeImageUrl': '/docs/static/|'largeImageUrl': '/pxt-ev3/docs/static/|g" \
                -e 's|](/static/|](/pxt-ev3/docs/static/|g' \
                -e 's|](/docs/static/|](/pxt-ev3/docs/static/|g' \
                -e 's|src="/static/|src="/pxt-ev3/docs/static/|g' \
                -e 's|src="/docs/static/|src="/pxt-ev3/docs/static/|g' \
                -e 's|href="/static/|href="/pxt-ev3/docs/static/|g' \
                -e 's|href="/docs/static/|href="/pxt-ev3/docs/static/|g' \
              {} +
          fi

      - name: Debug source docs references
        run: |
          echo '--- source refs to /static or /docs/static ---'
          grep -R '"/static/' docs | head -100 || true
          grep -R '"/docs/static/' docs | head -100 || true
          grep -R "'/static/" docs | head -100 || true
          grep -R "'/docs/static/" docs | head -100 || true
          grep -R '/pxt-ev3/docs/static/' docs | head -100 || true

      - name: Build static package
        run: |
          pxt staticpkg --route pxt-ev3

      - name: Ensure docs/static exists in output
        run: |
          ROOT="built/packaged/pxt-ev3"
          mkdir -p "$ROOT/docs/static"

          if [ -d "docs/static" ]; then
            cp -R docs/static/. "$ROOT/docs/static/" || true
          fi

      - name: Patch built output paths
        run: |
          ROOT="built/packaged/pxt-ev3"

          if [ -d "$ROOT" ]; then
            find "$ROOT" -type f \( -name "*.html" -o -name "*.md" -o -name "*.json" -o -name "*.js" -o -name "*.css" \) \
              -exec sed -i \
                -e 's|src="/static/|src="/pxt-ev3/docs/static/|g' \
                -e 's|href="/static/|href="/pxt-ev3/docs/static/|g' \
                -e 's|url(/static/|url(/pxt-ev3/docs/static/|g' \
                -e 's|](/static/|](/pxt-ev3/docs/static/|g' \
                -e 's|"\\/static\\/|"/pxt-ev3/docs/static/|g' \
                -e "s|'\\/static\\/|'\\/pxt-ev3\\/docs\\/static\\/|g" \
                -e 's|src="/docs/static/|src="/pxt-ev3/docs/static/|g' \
                -e 's|href="/docs/static/|href="/pxt-ev3/docs/static/|g' \
                -e 's|url(/docs/static/|url(/pxt-ev3/docs/static/|g' \
                -e 's|](/docs/static/|](/pxt-ev3/docs/static/|g' \
                -e 's|"\\/docs\\/static\\/|"/pxt-ev3/docs/static/|g' \
                -e "s|'\\/docs\\/static\\/|'\\/pxt-ev3\\/docs\\/static\\/|g" \
              {} +
          fi

      - name: Debug built references
        run: |
          ROOT="built/packaged/pxt-ev3"

          echo '--- leftover bad refs ---'
          grep -R '"/static/' "$ROOT" | head -100 || true
          grep -R '"/docs/static/' "$ROOT" | head -100 || true
          grep -R "'/static/" "$ROOT" | head -100 || true
          grep -R "'/docs/static/" "$ROOT" | head -100 || true

          echo '--- correct refs ---'
          grep -R '/pxt-ev3/docs/static/' "$ROOT" | head -100 || true

          echo '--- actual files ---'
          find "$ROOT/docs/static" -type f | head -200 || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: built/packaged/pxt-ev3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
