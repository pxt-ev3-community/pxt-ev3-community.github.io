name: pxt-deploy-static

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g pxt
          npm install

      - name: Fix old deps
        run: |
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      - name: Patch pxtarget.json for GitHub Pages
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('pxtarget.json', 'utf8'));
          data.appTheme = data.appTheme || {};
          const base = 'https://theb0nny.github.io/pxt-ev3/';

          data.appTheme.logoUrl = base;
          data.appTheme.homeUrl = base;
          if ('embedUrl' in data.appTheme) data.appTheme.embedUrl = base;
          if ('shareUrl' in data.appTheme) data.appTheme.shareUrl = base;

          if (Array.isArray(data.appTheme.docMenu)) {
            data.appTheme.docMenu = data.appTheme.docMenu.map(item => {
              if (!item || typeof item !== 'object') return item;
              const out = { ...item };
              for (const key of ['path', 'url']) {
                if (typeof out[key] === 'string' && out[key].startsWith('/')) {
                  out[key] = '/pxt-ev3' + out[key];
                }
              }
              return out;
            });
          }

          fs.writeFileSync('pxtarget.json', JSON.stringify(data, null, 4) + '\n');
          NODE

      - name: Rewrite docs source paths
        run: |
          if [ -d "docs" ]; then
            find docs -type f \( -name "*.md" -o -name "*.json" -o -name "*.html" -o -name "*.js" -o -name "*.txt" \) \
              -exec sed -i \
                -e 's|/docs/static/|/pxt-ev3/docs/static/|g' \
                -e 's|/static/|/pxt-ev3/docs/static/|g' \
              {} +
          fi

      - name: Debug docs source refs
        run: |
          echo '--- BAD refs in docs source ---'
          grep -R '/docs/static/' docs | head -100 || true
          grep -R '"/static/' docs | head -100 || true
          grep -R "'/static/" docs | head -100 || true

          echo '--- GOOD refs in docs source ---'
          grep -R '/pxt-ev3/docs/static/' docs | head -100 || true

      - name: Build static package
        run: |
          pxt staticpkg --route pxt-ev3

      - name: Copy docs/static into published site
        run: |
          ROOT="built/packaged/pxt-ev3"
          mkdir -p "$ROOT/docs/static"

          if [ -d "docs/static" ]; then
            cp -R docs/static/. "$ROOT/docs/static/" || true
          fi

      - name: Rewrite built output paths
        run: |
          ROOT="built/packaged/pxt-ev3"

          find "$ROOT" -type f \( -name "*.html" -o -name "*.json" -o -name "*.js" -o -name "*.css" -o -name "*.md" \) \
            -exec sed -i \
              -e 's|/docs/static/|/pxt-ev3/docs/static/|g' \
              -e 's|/static/|/pxt-ev3/docs/static/|g' \
            {} +

      - name: Debug built refs
        run: |
          ROOT="built/packaged/pxt-ev3"

          echo '--- BAD refs in build ---'
          grep -R '"/docs/static/' "$ROOT" | head -100 || true
          grep -R "'/docs/static/" "$ROOT" | head -100 || true
          grep -R '"/static/' "$ROOT" | head -100 || true
          grep -R "'/static/" "$ROOT" | head -100 || true

          echo '--- GOOD refs in build ---'
          grep -R '/pxt-ev3/docs/static/' "$ROOT" | head -200 || true

      - name: Debug tutorial images presence
        run: |
          ROOT="built/packaged/pxt-ev3/docs/static/tutorials"

          echo '--- tutorial image files ---'
          find "$ROOT" -maxdepth 1 -type f | sort | head -200 || true

          for f in \
            wake-up.png \
            make-an-animation.png \
            what-animal-am-i.png \
            pause-on-start.png \
            music-brick.png \
            run-motors.png \
            smooth-turn.png \
            tank-zigzag.png \
            spin-turn.png \
            pivot-turn.png \
            coast-or-brake.png \
            touch-sensor-values.png \
            pause-until-pressed.png \
            touch-to-run.png \
            what-color.png \
            line-following.png \
            move-to-color.png \
            redlight-greenlight.png \
            reflected-light-measure.png \
            reflected-light-calibration.png \
            object-near.png \
            wall-follower.png \
            calibrate-gyro.png \
            move-straight-with-gyro.png \
            drifter.png \
            turn-with-gyro.png \
            security-alert.png
          do
            if [ -f "$ROOT/$f" ]; then
              echo "FOUND $f"
            else
              echo "MISSING $f"
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: built/packaged/pxt-ev3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
