name: pxt-deploy-static

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PXT and project deps
        run: |
          npm install -g pxt
          npm install

      - name: Pin legacy TypeScript and ws typings
        run: |
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@8.5.4 --save-dev

      - name: Rebuild pxt-core against pinned TypeScript
        run: |
          cd node_modules/pxt-core
          npm install
          npx jake || true
          cd ../..

      - name: Verify TypeScript libs exist
        run: |
          ls -la node_modules/typescript/lib/lib.dom.d.ts
          ls -la node_modules/typescript/lib/lib.es2017.d.ts
          find node_modules/pxt-core -maxdepth 2 -type f | grep 'lib.dom.d.ts' || true

      - name: Build static package
        run: |
          pxt staticpkg --route pxt-ev3

      - name: Copy docs static assets
        run: |
          mkdir -p built/packaged/pxt-ev3/docs/static
          cp -R docs/static/. built/packaged/pxt-ev3/docs/static/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: built/packaged/pxt-ev3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
