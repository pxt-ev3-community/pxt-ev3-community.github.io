name: pxt-deploy-static

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PXT globally
        run: npm install -g pxt

      - name: Install project dependencies
        run: npm install --ignore-scripts

      - name: Pin legacy deps
        run: npm install typescript@3.9.10 @types/ws@8.5.4 --no-save

      - name: Build static package
        run: pxt staticpkg --route pxt-ev3

      - name: Copy docs static assets
        run: |
          mkdir -p built/packaged/pxt-ev3/docs/static
          if [ -d docs/static ]; then
            cp -R docs/static/. built/packaged/pxt-ev3/docs/static/
          fi

      - name: Rewrite static asset paths
        run: |
          grep -RIl '../docs/static/' built/packaged/pxt-ev3 | xargs -r sed -i 's#../docs/static/#docs/static/#g'
          grep -RIl '../../docs/static/' built/packaged/pxt-ev3 | xargs -r sed -i 's#../../docs/static/#docs/static/#g'
          grep -RIl '/docs/static/' built/packaged/pxt-ev3 | xargs -r sed -i 's#/docs/static/#docs/static/#g'

      - name: Debug broken paths
        run: |
          echo '=== docs/static refs ==='
          grep -R 'docs/static' built/packaged/pxt-ev3/ || true

          echo '=== route refs ==='
          grep -R 'pxt-ev3' built/packaged/pxt-ev3/ || true

      - name: Verify package output exists
        run: |
          test -d built/packaged/pxt-ev3
          test -f built/packaged/pxt-ev3/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: built/packaged/pxt-ev3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
