name: pxt-deploy-gh-pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm install -g pxt
          npm install
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      - name: Build GitHub Pages package
        run: |
          pxt staticpkg --route pxt-ev3 --githubpages
      
      - name: Rewrite docs paths in generated site
        run: |
          find built/gh-pages -type f -name "*.html" \
            -exec sed -i 's|/docs/static/|/pxt-ev3/docs/static/|g' {} +\
