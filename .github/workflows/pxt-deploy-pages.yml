name: pxt-deploy-static

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: |
          npm install -g pxt
          npm install

      - name: Fix old deps
        run: |
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete old gh-pages branch
        run: |
          git push origin --delete gh-pages || true

      - name: Build GitHub Pages package
        run: |
          pxt staticpkg --route pxt-ev3 --githubpages
      
      - name: Fix broken docs static links
        run: |
          find gh-pages -type f \( -name "*.html" -o -name "*.js" \) \
            -exec sed -i 's|/docs/static/|/pxt-ev3/docs/static/|g' {} +
      
      - name: Push rewritten files
        run: |
          cd gh-pages
          git add .
          git commit -m "Fix docs static paths" || echo "No changes"
          git push
