name: pxt-deploy-gh-pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm install -g pxt
          npm install
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build GitHub Pages package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pxt staticpkg --githubpages

      - name: Rewrite docs static paths inside gh-pages
        run: |
          find built/gh-pages -type f \( -name "*.html" -o -name "*.json" -o -name "*.js" \) \
            -exec sed -i 's|/docs/static/|/pxt-ev3/docs/static/|g' {} +

      - name: Commit rewritten paths
        run: |
          cd built/gh-pages
          git add .
          git commit -m "Fix docs static paths" || echo "No changes"
          git push
