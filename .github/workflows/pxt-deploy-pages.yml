name: pxt-deploy-static

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PXT globally
        run: npm install -g pxt

      - name: Install project dependencies
        run: npm install --ignore-scripts

      - name: Pin legacy deps
        run: npm install typescript@3.9.10 @types/ws@8.5.4 --no-save

      - name: Build static package
        run: pxt staticpkg --route pxt-ev3

      - name: Copy docs static assets
        run: |
          mkdir -p built/packaged/pxt-ev3/docs/static
          if [ -d docs/static ]; then
            cp -R docs/static/. built/packaged/pxt-ev3/docs/static/
          fi

      - name: Patch packaged files for GitHub Pages
        run: |
          set -e
          PKG="built/packaged/pxt-ev3"

          echo "=== patch @cdnUrl@ ==="
          grep -RIl '@cdnUrl@' "$PKG" | while read -r f; do
            sed -i 's#@cdnUrl@#/pxt-ev3#g' "$f"
            echo "patched @cdnUrl@ in $f"
          done || true

          echo "=== patch absolute /docs/static/ urls ==="
          grep -RIl '/docs/static/' "$PKG" | while read -r f; do
            sed -i 's#"/docs/static/#"/pxt-ev3/docs/static/#g' "$f"
            sed -i "s#'/docs/static/#'/pxt-ev3/docs/static/#g" "$f"
            sed -i 's#url(/docs/static/#url(/pxt-ev3/docs/static/#g' "$f"
            echo "patched /docs/static/ in $f"
          done || true

          echo "=== patch root /static/ urls in manifests and web files ==="
          grep -RIl '"/static/' "$PKG" | while read -r f; do
            sed -i 's#"/static/#"/pxt-ev3/static/#g' "$f"
            echo "patched /static/ in $f"
          done || true

          echo "=== patch escaped \/docs\/static\/ urls ==="
          grep -RIl '\\/docs\\/static\\/' "$PKG" | while read -r f; do
            sed -i 's#\\/docs\\/static\\/#\\/pxt-ev3\\/docs\\/static\\/#g' "$f"
            echo "patched escaped /docs/static/ in $f"
          done || true

          echo "=== patch escaped \/static\/ urls ==="
          grep -RIl '\\/static\\/' "$PKG" | while read -r f; do
            sed -i 's#\\/static\\/#\\/pxt-ev3\\/static\\/#g' "$f"
            echo "patched escaped /static/ in $f"
          done || true

          echo "=== patch ../docs/static/ urls ==="
          grep -RIl '\.\./docs/static/' "$PKG" | while read -r f; do
            sed -i 's#\.\./docs/static/#/pxt-ev3/docs/static/#g' "$f"
            echo "patched ../docs/static/ in $f"
          done || true

          echo "=== patch ../../docs/static/ urls ==="
          grep -RIl '\.\./\.\./docs/static/' "$PKG" | while read -r f; do
            sed -i 's#\.\./\.\./docs/static/#/pxt-ev3/docs/static/#g' "$f"
            echo "patched ../../docs/static/ in $f"
          done || true

      - name: Debug remaining bad paths
        run: |
          echo '=== remaining @cdnUrl@ ==='
          grep -R '@cdnUrl@' built/packaged/pxt-ev3/ || true

          echo '=== remaining root /docs/static/ ==='
          grep -R '/docs/static/' built/packaged/pxt-ev3/ || true

          echo '=== remaining root /static/ ==='
          grep -R '"/static/' built/packaged/pxt-ev3/ || true

          echo '=== packaged docs/static files ==='
          find built/packaged/pxt-ev3/docs/static -type f | sort | head -n 200 || true

      - name: Verify package output exists
        run: |
          test -d built/packaged/pxt-ev3
          test -f built/packaged/pxt-ev3/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: built/packaged/pxt-ev3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
