name: pxt-deploy-static

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: |
          npm install -g pxt
          npm install

      - name: Fix old deps
        run: |
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete old gh-pages branch
        run: |
          git push origin --delete gh-pages || true

      - name: Build GitHub Pages package
        run: |
          pxt staticpkg --route pxt-ev3 --githubpages
      
      - name: Fix docs asset paths
        run: |
          find gh-pages/docs -type f \( -name "*.html" -o -name "*.md" -o -name "*.json" \) \
            -exec sed -i \
              -e 's|src="/docs/static/|src="/pxt-ev3/docs/static/|g' \
              -e 's|href="/docs/static/|href="/pxt-ev3/docs/static/|g' \
              -e 's|](/docs/static/|](/pxt-ev3/docs/static/|g' \
              -e 's|"\/docs\/static\/|"/pxt-ev3/docs/static/|g' \
            {} +

      - name: Debug remaining bad paths
        run: |
          grep -R '"/docs/static/' gh-pages/docs | head -50 || true
      
      - name: Push rewritten files
        run: |
          cd gh-pages
          git add .
          git commit -m "Fix docs static paths" || echo "No changes"
          git push
