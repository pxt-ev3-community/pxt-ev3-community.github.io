name: pxt-deploy-gh-pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm install -g pxt
          npm install
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      - name: Build static package
        run: |
          pxt staticpkg --route pxt-ev3 --output built/site

      - name: Rewrite broken static paths
        run: |
          find built/site -type f \( -name "*.html" -o -name "*.json" -o -name "*.js" \) \
            -exec sed -i 's|/docs/static/|/pxt-ev3/docs/static/|g' {} +

      - name: Deploy to gh-pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan gh-pages-temp
          git rm -rf . || true
          cp -r built/site/* .
          touch .nojekyll
          git add .
          git commit -m "Deploy static site"
          git branch -M gh-pages
          git push -f origin gh-pages
