name: pxt-deploy-static

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g pxt
          npm install

      - name: Fix old deps
        run: |
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      - name: Patch pxtarget.json for GitHub Pages
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'pxtarget.json';
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));

          data.appTheme = data.appTheme || {};
          data.appTheme.logoUrl = 'https://theb0nny.github.io/pxt-ev3/';
          data.appTheme.homeUrl = 'https://theb0nny.github.io/pxt-ev3/';

          fs.writeFileSync(path, JSON.stringify(data, null, 4) + '\n');
          NODE

      - name: Show patched appTheme
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('pxtarget.json', 'utf8'));
          console.log(JSON.stringify(data.appTheme, null, 2));
          NODE

      - name: Build static package
        run: |
          pxt staticpkg --route pxt-ev3

      - name: Fix docs asset paths
        run: |
          if [ -d "built/packaged/pxt-ev3/docs" ]; then
            find built/packaged/pxt-ev3/docs -type f \( -name "*.html" -o -name "*.md" -o -name "*.json" \) \
              -exec sed -i \
                -e 's|src="/docs/static/|src="/pxt-ev3/docs/static/|g' \
                -e 's|href="/docs/static/|href="/pxt-ev3/docs/static/|g' \
                -e 's|](/docs/static/|](/pxt-ev3/docs/static/|g' \
                -e 's|"\\/docs\\/static\\/|"/pxt-ev3/docs/static/|g' \
              {} +
          fi

      - name: Debug remaining bad paths
        run: |
          grep -R '"/docs/static/' built/packaged/pxt-ev3 | head -50 || true
          grep -R 'href="/docs/' built/packaged/pxt-ev3 | head -50 || true
          grep -R 'src="/docs/' built/packaged/pxt-ev3 | head -50 || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: built/packaged/pxt-ev3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
