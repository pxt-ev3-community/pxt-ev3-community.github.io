name: pxt-deploy-static

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g pxt
          npm install

      - name: Fix old deps
        run: |
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      - name: Build GitHub Pages package
        run: |
          pxt staticpkg --githubpages

      - name: Copy docs static assets for tutorial images
        run: |
          mkdir -p built/gh-pages/docs/static
          cp -r docs/static/* built/gh-pages/docs/static/ || true

      - name: Add .nojekyll
        run: touch built/gh-pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: built/gh-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
